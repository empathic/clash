meta:
  name: init full lifecycle
  description: Test complete clash lifecycle — init, doctor, use, uninstall, verify

steps:
  - name: clash init installs hooks
    command: "init --no-import --agent claude"
    expect:
      exit_code: 0
      files:
        - path: ".claude/settings.json"
          root: home
          exists: true
          regex: "clash"

  - name: doctor reports healthy
    command: "doctor"
    expect:
      exit_code: 0

  - name: write a deny-all policy
    shell: "mkdir -p $HOME/.clash && printf 'load(\"@clash//std.star\", \"policy\", \"settings\", \"allow\", \"deny\")\\nsettings(default=deny())\\npolicy(\"test\", {\"Read\": allow()})\\n' > $HOME/.clash/policy.star"
    expect:
      exit_code: 0

  - name: Read allowed by policy
    hook: pre-tool-use
    tool_name: Read
    tool_input:
      file_path: /tmp/test.txt
    expect:
      decision: allow

  - name: Bash denied by default deny
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: echo hello
    expect:
      decision: deny

  - name: clash uninstall removes hooks
    command: "uninstall --yes"
    expect:
      exit_code: 0

  - name: settings file exists but clash hooks removed
    shell: "true"
    expect:
      exit_code: 0
      files:
        - path: ".claude/settings.json"
          root: home
          exists: true
      not:
        files:
          - path: ".claude/settings.json"
            root: home
            exists: true
            contains: "clash hook"
