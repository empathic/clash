meta:
  name: starlark policy — dict-based sandbox fs
  description: Test dict-based fs= syntax with bare strings, nesting, subpath(), and caps shorthand

clash:
  policy_star: |
    load("@clash//std.star", "policy", "settings", "sandbox", "tool", "path", "allow", "deny", "subpath", "glob")
    dev_box = sandbox(
        name = "dev",
        default = deny(),
        fs = {
            subpath("$PWD", follow_worktrees = True): allow("rwc"),
            glob("$TMPDIR/**"): allow(),
            path("$HOME"): {
                glob(".cargo/**"): allow("rwc"),
                glob(".rustup/**"): allow("r"),
                glob(".ssh/**"): deny(),
            },
        },
    )

    settings(default=deny())
    policy("test", {
        tool("Bash"): {
            "cargo": allow(sandbox = dev_box),
            "git": allow(sandbox = dev_box),
        },
        tool("Read"): allow(sandbox = dev_box),
    })

steps:
  - name: cargo allowed with dict sandbox
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: cargo build
    expect:
      decision: allow

  - name: git allowed with dict sandbox
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git status
    expect:
      decision: allow

  - name: read tool allowed
    hook: pre-tool-use
    tool_name: Read
    tool_input:
      file_path: /tmp/somefile.txt
    expect:
      decision: allow

  - name: npm denied by default
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: npm install
    expect:
      decision: deny

  - name: write denied by default
    hook: pre-tool-use
    tool_name: Write
    tool_input:
      file_path: /tmp/output.txt
      content: hello
    expect:
      decision: deny
