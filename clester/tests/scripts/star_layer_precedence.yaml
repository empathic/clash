meta:
  name: starlark policy — project layer overrides user rules
  description: Project-level policy can add deny rules that override user-level allows

clash:
  policy_star: |
    load("@clash//std.star", "match", "policy", "ask", "allow")
    def main():
        return policy(default=ask(), rules=[
            match({"Bash": {("git", "cargo"): allow()}}),
        ])
  project_policy_star: |
    load("@clash//std.star", "match", "policy", "deny")
    def main():
        return policy(default=deny(), rules=[
            match({"Bash": {"git": {"push": deny()}}}),
        ])

steps:
  - name: git status allowed by user rule (not overridden by project)
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git status
    expect:
      decision: allow

  - name: git push denied by project deny rule
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git push origin main
    expect:
      decision: deny

  - name: cargo build allowed by user rule
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: cargo build
    expect:
      decision: allow
