meta:
  name: starlark policy — project default overrides user default
  description: Project-level default effect takes precedence over user-level default

clash:
  policy_star: |
    load("@clash//std.star", "policy", "settings", "allow")
    settings(default=allow())
    policy("test", {})
  project_policy_star: |
    load("@clash//std.star", "policy", "settings", "deny")
    settings(default=deny())
    policy("test", {})

steps:
  - name: unknown command denied by project default (overrides user allow)
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: some-unknown-command --flag
    expect:
      decision: deny

  - name: read denied by project default
    hook: pre-tool-use
    tool_name: Read
    tool_input:
      file_path: /tmp/somefile.txt
    expect:
      decision: deny

  - name: write denied by project default
    hook: pre-tool-use
    tool_name: Write
    tool_input:
      file_path: /tmp/output.txt
      content: hello
    expect:
      decision: deny
