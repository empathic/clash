meta:
  name: assertion combinators
  description: Test all_of, any_of, and not combinators

clash:
  policy_star: |
    load("@clash//std.star", "when", "policy", "settings", "allow", "deny")
    settings(default=deny())
    policy("test", rules=[
        when({"Bash": {"git": allow()}}),
    ])

steps:
  - name: all_of — decision and reason both match
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git status
    expect:
      all_of:
        - decision: allow
        - reason_regex: "(?i)allow"

  - name: any_of — one of the decisions matches
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git status
    expect:
      any_of:
        - decision: deny
        - decision: allow

  - name: not — decision is not deny
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git status
    expect:
      not:
        decision: deny

  - name: combined — leaf + combinator
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git status
    expect:
      decision: allow
      not:
        reason_contains: "denied"

  - name: nested combinators — all_of inside any_of
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git diff
    expect:
      any_of:
        - decision: deny
        - all_of:
            - decision: allow
            - reason_regex: "(?i)allow"
