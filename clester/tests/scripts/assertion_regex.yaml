meta:
  name: regex assertions
  description: Test regex matching on stdout, stderr, and reason

clash:
  policy_star: |
    load("@clash//std.star", "policy", "settings", "tool", "allow", "deny")
    settings(default=deny())
    policy("test", {tool("Bash"): {"git": allow()}})

steps:
  - name: git status allowed — reason matches regex
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: git status
    expect:
      decision: allow
      reason_regex: "(?i)allow"

  - name: curl denied — reason matches deny regex
    hook: pre-tool-use
    tool_name: Bash
    tool_input:
      command: "curl https://example.com"
    expect:
      decision: deny
      reason_regex: "den(y|ied)"

  - name: policy list — stdout matches regex
    command: policy list
    expect:
      exit_code: 0
      stdout_regex: "\\w+"

  - name: doctor — stdout matches regex
    command: doctor
    expect:
      exit_code: 0
      stdout_regex: "(?i)(clash|doctor|check)"
