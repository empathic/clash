meta:
  name: starlark policy — tool rules with sandbox fs
  description: Test tool rules with sandbox filesystem restrictions

clash:
  policy_star: |
    load("@clash//std.star", "tool", "policy", "sandbox", "path")
    def main():
        read_fs = sandbox(fs=[path("/tmp", read=allow)])
        write_fs = sandbox(fs=[path("/tmp/out", read=allow, write=allow)])
        return policy(default=deny, rules=[
            tool("Read").sandbox(read_fs).allow(),
            tool(["Write", "Edit"]).sandbox(write_fs).allow(),
        ])

steps:
  - name: read /tmp/foo allowed by sandbox
    hook: pre-tool-use
    tool_name: Read
    tool_input:
      file_path: /tmp/foo.txt
    expect:
      decision: allow

  - name: read /tmp/deep/nested allowed by sandbox subpath
    hook: pre-tool-use
    tool_name: Read
    tool_input:
      file_path: /tmp/deep/nested/file.txt
    expect:
      decision: allow

  - name: read /etc/hosts denied by sandbox
    hook: pre-tool-use
    tool_name: Read
    tool_input:
      file_path: /etc/hosts
    expect:
      decision: deny

  - name: write /tmp/out/file.txt allowed by sandbox
    hook: pre-tool-use
    tool_name: Write
    tool_input:
      file_path: /tmp/out/file.txt
      content: hello
    expect:
      decision: allow

  - name: write /tmp/other.txt denied by sandbox
    hook: pre-tool-use
    tool_name: Write
    tool_input:
      file_path: /tmp/other.txt
      content: hello
    expect:
      decision: deny
