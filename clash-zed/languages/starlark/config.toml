name = "Starlark"
grammar = "starlark"
path_suffixes = ["star"]
line_comments = ["# "]
autoclose_before = ";:.,=}])>"

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = true

[[brackets]]
start = "("
end = ")"
close = true
newline = false

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["string"]

[[brackets]]
start = "'"
end = "'"
close = true
newline = false
not_in = ["string"]
